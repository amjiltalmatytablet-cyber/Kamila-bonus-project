<!DOCTYPE html>
<html lang="kk" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivilBuild | Көпір Инженериясы</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0ea5e9',
                        secondary: '#10b981',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300">

    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md border-b dark:border-gray-700">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-emerald-500 bg-clip-text text-transparent">
                CivilBuild
            </h1>
            <div class="flex items-center gap-4">
                <button id="themeToggle" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:scale-110 transition">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block"></i>
                </button>
            </div>
        </div>
    </nav>

    <header class="py-12 bg-white dark:bg-gray-800 border-b dark:border-gray-700">
        <div class="container mx-auto px-4 text-center">
            <h2 class="text-4xl font-extrabold mb-4">Инженерлік Шешімдер Каталогы</h2>
            <p class="text-gray-600 dark:text-gray-400 max-w-2xl mx-auto">VectraBridge Pro жүйесіне арналған материалдар мен құрылымдардың толық тізімі.</p>
            
            <div class="mt-8 flex flex-col md:flex-row gap-4 justify-center">
                <input type="text" id="searchInput" placeholder="Материал атын іздеу..." 
                    class="px-6 py-3 rounded-xl border dark:border-gray-600 dark:bg-gray-700 focus:ring-2 focus:ring-primary outline-none w-full md:w-96">
                <select id="categoryFilter" class="px-6 py-3 rounded-xl border dark:border-gray-600 dark:bg-gray-700 outline-none">
                    <option value="all">Барлық санаттар</option>
                    <option value="Материалдар">Материалдар</option>
                    <option value="Құрылымдар">Құрылымдар</option>
                    <option value="Құралдар">Құралдар</option>
                </select>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-12">
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            </div>
    </main>

    <div id="modal" class="fixed inset-0 z-[60] hidden bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 w-full max-w-2xl rounded-2xl overflow-hidden relative shadow-2xl animate-in fade-in zoom-in duration-300">
            <button id="closeModal" class="absolute top-4 right-4 text-2xl hover:rotate-90 transition">&times;</button>
            <div id="modalContent" class="p-8"></div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 right-8 transform translate-y-20 opacity-0 transition-all duration-500 z-[100]">
        <div class="bg-emerald-500 text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-3">
            <i class="fas fa-check-circle"></i>
            <span id="toastMessage">Сәтті орындалды!</span>
        </div>
    </div>

    <footer class="bg-white dark:bg-gray-800 border-t dark:border-gray-700 py-8 text-center text-gray-500">
        <p>&copy; 2026 CivilBuild Engineering. Барлық құқықтар қорғалған.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
